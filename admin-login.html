<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | International Volunteer Home Tz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest: #1a3c2e;
      --forest-mid: #2d6a4f;
      --forest-light: #52b788;
      --gold: #d4a017;
      --gold-light: #f4c842;
      --sand: #f5f0e8;
      --red: #b91c1c;
      --red-pale: #fef2f2;
      --text: #101828;
      --text-muted: #667085;
      --border: #e4e7ec;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow-lg: 0 12px 40px rgba(16,24,40,0.12);
      --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1f17 0%, var(--forest) 45%, var(--forest-mid) 100%);
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
      animation: in 0.3s ease;
    }
    @keyframes in { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 42px; height: 42px;
      background: var(--gold);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .brand strong {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--forest);
      display: block;
      font-family: 'Playfair Display', serif;
    }
    .brand span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
      font-family: 'Playfair Display', serif;
    }
    .sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.92rem;
      color: var(--text);
      outline: none;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .form-control:focus { border-color: var(--forest-light); box-shadow: 0 0 0 3px rgba(82,183,136,0.1); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--forest);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Inter', sans-serif;
    }
    .btn-login:hover { background: var(--forest-mid); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-box {
      background: var(--red-pale);
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.83rem;
      margin-bottom: 18px;
      display: none;
    }
    .error-box.show { display: block; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 22px;
    }

    /* ── Social Icon (for consistency) ── */
    .social-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      transition: var(--transition);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .social-btn:hover { background: var(--gold); color: var(--forest); }

    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">🌍</div>
      <div>
        <strong>International Volunteer Home Tz</strong>
        <span>Admin Dashboard</span>
      </div>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to manage bookings, safaris, and applications.</p>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="admin@internationalvolunteerhome.com" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password" />
      </div>
      <button class="btn-login" type="submit" id="loginBtn">
        <span class="spinner" id="spinner"></span>
        <span id="loginBtnText">Sign In</span>
      </button>
    </form>

    <p class="footer-note">🔒 Authorized personnel only. Sessions expire after 60 minutes of inactivity.</p>
  </div>

  <script>
    const API = 'https://wild-tours.onrender.com/api';

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const loginBtnText = document.getElementById('loginBtnText');

    // Redirect if already logged in
    const existingToken = localStorage.getItem('wr_token');
    const existingUser = localStorage.getItem('wr_user');

    if (existingToken && existingUser) {
      try {
        const u = JSON.parse(existingUser);
        if (u.role === 'admin' || u.role === 'staff') {
          window.location.href = '/admin2.html';
        }
      } catch (e) {}
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorBox.classList.remove('show');
      errorBox.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      spinner.classList.add('show');
      loginBtnText.textContent = 'Signing in…';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Invalid email or password.');
        }

        const token = data.token;
        const user = data.user;

        if (!token) throw new Error('No token returned from server.');

        if (!user || (user.role !== 'admin' && user.role !== 'staff')) {
          throw new Error('This account does not have admin access.');
        }

        localStorage.setItem('wr_token', token);
        localStorage.setItem('wr_user', JSON.stringify(user));

        window.location.href = '/admin2.html';

      } catch (err) {
        errorBox.textContent = err.message || 'Something went wrong.';
        errorBox.classList.add('show');

        loginBtn.disabled = false;
        spinner.classList.remove('show');
        loginBtnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
